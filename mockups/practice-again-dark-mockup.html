<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mockup — Practice again (dark) | InterviewAI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: Inter, system-ui, sans-serif;
        color: #f4f4f5;
        background: linear-gradient(165deg, #030008 0%, #0a0618 38%, #000000 100%);
        color-scheme: dark;
      }

      .shell {
        min-height: 100vh;
        position: relative;
        overflow-x: hidden;
      }

      .grid-bg {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
        background-image: linear-gradient(rgba(139, 92, 246, 0.05) 1px, transparent 1px),
          linear-gradient(90deg, rgba(139, 92, 246, 0.05) 1px, transparent 1px);
        background-size: 48px 48px;
        animation: gridPulse 8s ease-in-out infinite;
      }
      @keyframes gridPulse {
        0%,
        100% {
          opacity: 0.42;
        }
        50% {
          opacity: 0.58;
        }
      }

      .orb {
        position: fixed;
        border-radius: 50%;
        pointer-events: none;
        z-index: 0;
        filter: blur(0px);
      }
      .orb-a {
        top: -180px;
        left: -120px;
        width: 480px;
        height: 480px;
        background: radial-gradient(circle, rgba(124, 58, 237, 0.14) 0%, transparent 70%);
      }
      .orb-b {
        bottom: -80px;
        right: -80px;
        width: 360px;
        height: 360px;
        background: radial-gradient(circle, rgba(79, 70, 229, 0.1) 0%, transparent 70%);
      }

      /* Simplified candidate nav — matches glass dark header vibe */
      .nav {
        position: sticky;
        top: 0;
        z-index: 10;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 14px 28px;
        background: rgba(5, 2, 15, 0.85);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border-bottom: 1px solid rgba(124, 58, 237, 0.15);
      }
      .nav-mark {
        font-weight: 800;
        font-size: 15px;
        letter-spacing: -0.02em;
        background: linear-gradient(90deg, #fff 0%, #c4b5fd 100%);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .nav-pill {
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.06em;
        padding: 4px 10px;
        border-radius: 999px;
        background: rgba(124, 58, 237, 0.25);
        color: #e9d5ff;
        border: 1px solid rgba(167, 139, 250, 0.35);
      }

      .main {
        position: relative;
        z-index: 2;
        max-width: 520px;
        margin: 0 auto;
        padding: 48px 20px 64px;
      }

      .card {
        border-radius: 20px;
        background: rgba(16, 12, 32, 0.58);
        border: 1px solid rgba(139, 92, 246, 0.22);
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
        padding: 36px 28px 32px;
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.45), 0 0 0 1px rgba(255, 255, 255, 0.03) inset;
      }

      .ring-wrap {
        width: 88px;
        height: 88px;
        margin: 0 auto 28px;
        position: relative;
      }
      .ring-wrap svg {
        display: block;
        width: 100%;
        height: 100%;
        transform: rotate(-90deg);
      }
      .ring-bg {
        fill: none;
        stroke: rgba(124, 58, 237, 0.15);
        stroke-width: 5;
      }
      .ring-fg {
        fill: none;
        stroke: url(#ringGrad);
        stroke-width: 5;
        stroke-linecap: round;
        stroke-dasharray: 251;
        stroke-dashoffset: 62;
        filter: drop-shadow(0 0 8px rgba(124, 58, 237, 0.5));
      }
      .ring-center {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 800;
        font-size: 22px;
        color: #fff;
        text-shadow: 0 0 24px rgba(124, 58, 237, 0.4);
      }

      .title {
        text-align: center;
        font-size: clamp(1.5rem, 4vw, 1.85rem);
        font-weight: 800;
        letter-spacing: -0.03em;
        line-height: 1.2;
        margin: 0 0 12px;
        background: linear-gradient(180deg, #ffffff 0%, #f5f3ff 40%, #c4b5fd 100%);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .sub {
        text-align: center;
        font-size: 14px;
        color: rgba(255, 255, 255, 0.45);
        font-weight: 600;
        margin: 0 0 28px;
      }

      .actions {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .btn-primary {
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 16px 20px;
        border: none;
        border-radius: 14px;
        font-family: inherit;
        font-size: 15px;
        font-weight: 800;
        color: #fff;
        cursor: pointer;
        background: linear-gradient(135deg, #7c3aed, #5b21b6, #4f46e5);
        background-size: 200% 200%;
        animation: gradShift 4s ease infinite;
        box-shadow: 0 6px 28px rgba(124, 58, 237, 0.35);
        position: relative;
        overflow: hidden;
        transition: filter 0.2s, box-shadow 0.2s;
      }
      .btn-primary::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 1px;
        background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.28), transparent);
      }
      .btn-primary:hover {
        filter: brightness(1.06);
        box-shadow: 0 10px 36px rgba(124, 58, 237, 0.48);
      }
      .btn-primary span.che {
        font-size: 20px;
        font-weight: 300;
        opacity: 0.95;
      }
      @keyframes gradShift {
        0%,
        100% {
          background-position: 0% 50%;
        }
        50% {
          background-position: 100% 50%;
        }
      }

      .btn-row {
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 16px 20px;
        border-radius: 12px;
        font-family: inherit;
        font-size: 14px;
        font-weight: 700;
        color: #fff;
        cursor: pointer;
        text-align: left;
        background: rgba(8, 5, 18, 0.92);
        border: 1px solid rgba(124, 58, 237, 0.28);
        box-shadow: 0 0 22px rgba(124, 58, 237, 0.14), inset 0 1px 0 rgba(255, 255, 255, 0.04);
        transition: border-color 0.2s, box-shadow 0.2s;
      }
      .btn-row:hover {
        border-color: rgba(167, 139, 250, 0.42);
        box-shadow: 0 0 28px rgba(124, 58, 237, 0.22);
      }
      .btn-row small {
        display: block;
        margin-top: 4px;
        font-size: 11px;
        font-weight: 600;
        color: rgba(255, 255, 255, 0.42);
      }
      .btn-row .che {
        font-size: 18px;
        font-weight: 300;
        color: #fff;
        flex-shrink: 0;
      }

      .footer-link-wrap {
        display: flex;
        justify-content: center;
        margin-top: 24px;
      }
      .footer-link {
        background: rgba(0, 0, 0, 0.55);
        border: 1px solid rgba(255, 255, 255, 0.2);
        color: #fff;
        border-radius: 999px;
        padding: 12px 28px;
        font-size: 13px;
        font-weight: 600;
        font-family: inherit;
        cursor: pointer;
        transition: border-color 0.2s, background 0.2s;
      }
      .footer-link:hover {
        border-color: rgba(167, 139, 250, 0.45);
        background: rgba(124, 58, 237, 0.12);
      }

      .mock-tag {
        text-align: center;
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.28);
        margin-bottom: 16px;
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <div class="grid-bg" aria-hidden="true"></div>
      <div class="orb orb-a" aria-hidden="true"></div>
      <div class="orb orb-b" aria-hidden="true"></div>

      <header class="nav">
        <span class="nav-mark">InterviewAI</span>
        <span class="nav-pill">CANDIDATE · MOCKUP</span>
      </header>

      <main class="main">
        <p class="mock-tag">Design preview only — not wired to the app</p>
        <div class="card">
          <div class="ring-wrap" aria-hidden="true">
            <svg viewBox="0 0 100 100">
              <defs>
                <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" stop-color="#a78bfa" />
                  <stop offset="50%" stop-color="#7c3aed" />
                  <stop offset="100%" stop-color="#4f46e5" />
                </linearGradient>
              </defs>
              <circle class="ring-bg" cx="50" cy="50" r="40" />
              <circle class="ring-fg" cx="50" cy="50" r="40" />
            </svg>
            <div class="ring-center">72</div>
          </div>

          <h1 class="title">Great effort — keep going</h1>
          <p class="sub">What would you like to do next?</p>

          <div class="actions">
            <button type="button" class="btn-primary">
              <span>Redo full interview</span>
              <span class="che" aria-hidden="true">›</span>
            </button>

            <button type="button" class="btn-row">
              <span>
                Practice weak questions
                <small>Same role, lowest-scoring prompts only</small>
              </span>
              <span class="che" aria-hidden="true">›</span>
            </button>

            <button type="button" class="btn-row">
              <span>
                View dashboard
                <small>History, tracker, and documents</small>
              </span>
              <span class="che" aria-hidden="true">›</span>
            </button>

            <button type="button" class="btn-row">
              <span>
                New interview (upload)
                <small>Fresh CV and job context</small>
              </span>
              <span class="che" aria-hidden="true">›</span>
            </button>
          </div>

          <div class="footer-link-wrap">
            <button type="button" class="footer-link">Go to home</button>
          </div>
        </div>
      </main>
    </div>
  </body>
</html>
